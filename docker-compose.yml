services:
  frontend:
    build: ./ui
    ports:
      - "8501:8501"
    volumes:
      - ./ui:/app
    environment:
      - API_URL
      - STREAMLIT_AUTH_GOOGLE_CLIENT_ID
      - STREAMLIT_AUTH_GOOGLE_CLIENT_SECRET
      - STREAMLIT_AUTH_REDIRECT_URI
      - STREAMLIT_AUTH_COOKIE_SECRET
      - STREAMLIT_AUTH_EXPOSE_TOKENS
      - STREAMLIT_AUTH_SERVER_METADATA_URL
    depends_on:
      - backend

  canvas-mcp:
    build: ./mcp/canvas
    ports:
      - "8001:8001"
    environment:
      - CANVAS_TOKEN
      - CANVAS_BASE_URL

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - studypilot_data:/app/data
    environment:
      - OPENAI_API_KEY
      - CANVAS_BASE_URL
      - CANVAS_MCP_URL=http://canvas-mcp:8001/sse
      - FRONTEND_URL
      - LANGCHAIN_API_KEY
      - LANGCHAIN_PROJECT
      - LANGCHAIN_TRACING_V2
    depends_on:
      - canvas-mcp

volumes:
  studypilot_data:
